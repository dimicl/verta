<div class="modal-container">
  <div class="modal-header">
    <div>
      <span class="modal-header-title">{{ modalTitle }}</span>
      <div class="parent-task" *ngIf="isSubtask && parentTaskTitle">
        Parent task: <strong>{{ parentTaskTitle }}</strong>
      </div>
    </div>
    <div
      class="modal-header-actions"
      ngbTooltip="Close"
      triggers="hover"
      container="body"
      placement="bottom"
      (click)="onClose()"
    >
      <svg-icon
        class="modal-header-actions-icon"
        [src]="sharedSvgRoutes.CLOSE_ICON"
      ></svg-icon>
    </div>
  </div>

  <div class="modal-body">
    <div class="title-part">
      <div class="title-header">Title</div>
      <input
        class="title-input"
        type="text"
        [placeholder]="isSubtask ? 'Enter subtask title...' : 'Enter task title...'"
        [(ngModel)]="title"
      />
    </div>

    <div class="description-part">
      <div class="description-header">Description</div>
      <textarea
        class="description-textarea"
        rows="4"
        placeholder="Enter description..."
        [(ngModel)]="description"
      ></textarea>
    </div>

    <app-task-subtasks
      *ngIf="!isSubtask"
      [workItemId]="workItemId"
      [parentTaskTitle]="title"
      [members]="members"
      [currentUserId]="currentUserId"
      [currentUserFirstName]="currentUserFirstName"
      [currentUserLastName]="currentUserLastName"
      (subtasksChanged)="onSubtasksChanged($event)"
      (createSubtaskRequest)="onCreateSubtask()"
      (editSubtaskRequest)="onEditSubtask($event)"
    ></app-task-subtasks>

    <app-task-comments
      [workItemId]="commentsWorkItemId"
      [subWorkItemId]="commentsSubWorkItemId"
      [currentUserId]="currentUserId"
      [currentUserFirstName]="currentUserFirstName"
      [currentUserLastName]="currentUserLastName"
    ></app-task-comments>

    <div class="fields-row">
      <div class="field-group" *ngIf="!isEditMode && !isSubtask">
        <div class="field-label">Sprint</div>
        <select class="field-select" [(ngModel)]="sprintId">
          <option [ngValue]="null">No sprint (Backlog)</option>
          <option *ngFor="let sprint of sprints" [ngValue]="sprint.id">
            {{ sprint.name }}
          </option>
        </select>
      </div>
      <div class="field-group">
        <div class="field-label">Assigned</div>
        <app-task-assignee
          [members]="members"
          [(assignedUserId)]="assignedUserId"
        ></app-task-assignee>
      </div>
      <div class="field-group" *ngIf="isEditMode">
        <div class="field-label">Status</div>
        <app-ve-status
          [taskStatus]="status"
          (statusChange)="status = $event"
        ></app-ve-status>
      </div>
      <div class="field-group" *ngIf="isSubtask">
        <div class="field-label">Priority</div>
        <app-task-priority
          [priority]="priority"
          (priorityChange)="priority = $event"
        ></app-task-priority>
      </div>
      <div class="field-group">
        <div class="field-label">Points</div>
        <input class="field-input" type="number" min="0" [(ngModel)]="points" />
      </div>
    </div>

    <div class="attachments">
      <div class="attachments-header">
        <span class="attachments-title">Documents</span>
        <div class="attachments-counter">
          <span class="files-counter">{{ dropZone?.fileCount ?? 0 }}</span>
        </div>
      </div>
      <app-drop-zone
        [workItemId]="commentsWorkItemId"
        [subWorkItemId]="commentsSubWorkItemId"
      ></app-drop-zone>
    </div>
  </div>

  <div class="modal-error" *ngIf="errorMessage">{{ errorMessage }}</div>

  <div class="modal-footer">
    <button
      type="button"
      class="action-button action-button--danger"
      *ngIf="isSubtask && isEditMode"
      (click)="onDeleteSubtask()"
    >
      Delete
    </button>
    <div class="action-button" (click)="onSave()">
      {{ saveLabel }}
    </div>
  </div>
</div>
