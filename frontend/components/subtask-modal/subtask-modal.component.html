<div class="modal-container">
  <div class="modal-header">
    <div>
      <span class="modal-header-title">
        {{ isEditMode ? "Edit Subtask" : "Add Subtask" }}
      </span>
      <div class="parent-task" *ngIf="parentTaskTitle">
        Parent task: <strong>{{ parentTaskTitle }}</strong>
      </div>
    </div>
    <div
      class="modal-header-actions"
      ngbTooltip="Close"
      triggers="hover"
      container="body"
      placement="bottom"
      (click)="onClose()"
    >
      <svg-icon
        class="modal-header-actions-icon"
        [src]="sharedSvgRoutes.CLOSE_ICON"
      ></svg-icon>
    </div>
  </div>

  <div class="modal-body">
    <div class="title-part">
      <div class="title-header">Title</div>
      <input
        class="title-input"
        type="text"
        placeholder="Enter subtask title..."
        [(ngModel)]="title"
      />
    </div>

    <div class="description-part">
      <div class="description-header">Description</div>
      <textarea
        class="description-textarea"
        rows="4"
        placeholder="Enter description..."
        [(ngModel)]="description"
      ></textarea>
    </div>

    <app-task-comments
      [workItemId]="parentWorkItemId"
      [subWorkItemId]="subWorkItemId"
      [currentUserId]="currentUserId"
      [currentUserFirstName]="currentUserFirstName"
      [currentUserLastName]="currentUserLastName"
    ></app-task-comments>

    <div class="fields-row">
      <div class="field-group">
        <div class="field-label">Assigned</div>
        <app-task-assignee
          [members]="members"
          [(assignedUserId)]="assignedUserId"
        ></app-task-assignee>
      </div>
      <div class="field-group" *ngIf="isEditMode">
        <div class="field-label">Status</div>
        <app-ve-status
          [taskStatus]="status"
          (statusChange)="status = $event"
        ></app-ve-status>
      </div>
      <div class="field-group">
        <div class="field-label">Priority</div>
        <app-task-priority
          [priority]="priority"
          (priorityChange)="priority = $event"
        ></app-task-priority>
      </div>
      <div class="field-group">
        <div class="field-label">Points</div>
        <input class="field-input" type="number" min="0" [(ngModel)]="points" />
      </div>
    </div>

    <div class="attachments">
      <div class="attachments-header">
        <span class="attachments-title">Documents</span>
        <div class="attachments-counter">
          <span class="files-counter">{{ dropZone?.fileCount ?? 0 }}</span>
        </div>
      </div>
      <app-drop-zone
        [workItemId]="parentWorkItemId"
        [subWorkItemId]="subWorkItemId"
      ></app-drop-zone>
    </div>
  </div>

  <div class="modal-footer">
    <div class="action-button" (click)="onSave()">
      {{ isEditMode ? "Save changes" : "Create subtask" }}
    </div>
  </div>
</div>
