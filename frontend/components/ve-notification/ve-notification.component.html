<div
  class="notification-icon-container"
  [class.active-container]="onNotificationShown()"
  [ngbPopover]="notificationPopover"
  placement="bottom-end"
  triggers="click"
  [autoClose]="true"
  container="body"
  (shown)="onPopoverShown()"
  (hidden)="onPopoverHidden()"
>
  <div
    ngbTooltip="Notification"
    [tooltipClass]="'notification-tooltip'"
    [animation]="true"
    placement="bottom"
    triggers="hover"
    container="body"
  >
    <svg-icon
      class="notification-icon"
      [src]="sharedSvgRoutes.NOTIFICATION_ICON"
    ></svg-icon>
    <span class="notification-badge" *ngIf="unreadCount() > 0">
      {{ unreadCount() }}
    </span>
  </div>
</div>

<ng-template #notificationPopover>
  <div class="notification-popover">
    <p class="popover-title">Notifications</p>
    <ng-container *ngIf="notifications().length > 0; else emptyNotifications">
      <div class="notification-item" *ngFor="let item of notifications()">
        <div class="notification-item-title">{{ item.title }}</div>
        <div class="notification-item-message">{{ item.message }}</div>
        <div class="notification-item-time">
          {{ item.createdAt | date: 'short' }}
        </div>
      </div>
    </ng-container>
    <ng-template #emptyNotifications>
      <div class="notification-empty">No notifications yet</div>
    </ng-template>
  </div>
</ng-template>
