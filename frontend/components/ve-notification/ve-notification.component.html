<div
  class="notification-icon-container"
  [class.active-container]="onNotificationShown()"
  [ngbPopover]="notificationPopover"
  placement="bottom-end"
  triggers="click"
  [autoClose]="true"
  container="body"
  (shown)="onNotificationShown.set(true)"
  (hidden)="onNotificationShown.set(false)"
>
  <div
    ngbTooltip="Notification"
    [tooltipClass]="'notification-tooltip'"
    [animation]="true"
    placement="bottom"
    triggers="hover"
    container="body"
  >
    <svg-icon
      class="notification-icon"
      [src]="sharedSvgRoutes.NOTIFICATION_ICON"
    ></svg-icon>
  </div>
</div>

<ng-template #notificationPopover>
  <p class="popover-title">Notification</p>
</ng-template>
